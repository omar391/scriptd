id: mbrew
display_name: Brew Manager
mode: interval
interval_seconds: 43200
keychain_service: BrewAutoUpdate
askpass_path: ~/Library/Application Support/scriptd/mbrew/brew_askpass.sh
legacy_log_dir: ~/Library/Logs/Homebrew
max_log_size_mb: 50
max_log_age_days: 30
max_rotated_logs: 5
homebrew_bin: /opt/homebrew/bin/brew
sudoers_path: /etc/sudoers.d/homebrew
sudoers_timeout_path: /etc/sudoers.d/homebrew_timeout
sudo_timeout_hours: 2
